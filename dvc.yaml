# dvc.yaml
# =========
# DVC pipeline definition for the business/finance news scraping pipeline.
#
# IMPORTANT — how this works with batch_pipeline.py:
#
#   batch_pipeline.py is your REAL pipeline runner. It writes files to
#   cleaned/ directly on its own schedule as batches finish. It is the
#   source of truth for data production.
#
#   dvc.yaml tracks CODE dependencies only — it tells DVC which scripts
#   are part of the pipeline so it can detect when code changes. It does
#   NOT own the cleaned/ folder as a stage output, because batch_pipeline.py
#   writes there directly and DVC must not interfere with that.
#
#   cleaned/ and bigquery_article_results.csv are tracked as standalone
#   DVC files (via `dvc add`), completely separate from these stages.
#   You push them manually with `dvc push` after a pipeline run.
#
# Commands:
#     dvc status          — check if any code deps have changed
#     dvc repro           — re-run pipeline if code changed (runs batch_pipeline.py)
#     dvc push            — push cleaned/ data to shared storage
#     dvc pull            — pull cleaned/ data from shared storage

stages:

  # ---------------------------------------------------------------------------
  # STAGE 1 — scrape
  # Reads bigquery_article_results.csv, fetches article text from each URL,
  # and writes raw batch CSVs into batches/
  #
  # NOTE: batches/ is intentionally NOT listed as an `out` here.
  # batch_pipeline.py manages batches/ internally and deletes raw files
  # after processing. DVC does not need to own or cache this folder.
  # ---------------------------------------------------------------------------
  scrape:
    cmd: python pipeline/url_scraping.py
    deps:
      - pipeline/url_scraping.py
      - bigquery_article_results.csv

  # ---------------------------------------------------------------------------
  # STAGE 2 — normalize
  # Cleans raw article text. Runs inside batch_pipeline.py via tempfiles.
  # Listed here so DVC detects when normalize_scraped_news.py changes.
  # ---------------------------------------------------------------------------
  normalize:
    cmd: echo "normalize runs inside batch_pipeline.py"
    deps:
      - pipeline/normalize_scraped_news.py

  # ---------------------------------------------------------------------------
  # STAGE 3 — filter
  # Drops non-business articles. Runs inside batch_pipeline.py.
  # Listed here so DVC detects when filter_business.py changes.
  # ---------------------------------------------------------------------------
  filter:
    cmd: echo "filter runs inside batch_pipeline.py"
    deps:
      - pipeline/filter_business.py

  # ---------------------------------------------------------------------------
  # STAGE 4 — pipeline (full run)
  # This is the only stage you actually need to call directly.
  # Runs batch_pipeline.py which orchestrates all stages above.
  #
  # cleaned/ is NOT listed as an `out` here — batch_pipeline.py owns it.
  # After this stage finishes, you manually run `dvc push` to share the data.
  # ---------------------------------------------------------------------------
  pipeline:
    cmd: python pipeline/batch_pipeline.py
    deps:
      - pipeline/batch_pipeline.py
      - pipeline/url_scraping.py
      - pipeline/normalize_scraped_news.py
      - pipeline/filter_business.py
      - bigquery_article_results.csv
